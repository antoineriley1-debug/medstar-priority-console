// ---------- CSV PARSER ----------
function parseCsv(text) {
  const out = [];
  let row = [], cell = "", inQ = false, i = 0;
  while (i < text.length) {
    const c = text[i];
    if (inQ) {
      if (c === '"' && text[i+1] === '"') { cell += '"'; i += 2; continue; }
      if (c === '"') { inQ = false; i++; continue; }
      cell += c; i++;
    } else {
      if (c === '"') { inQ = true; i++; continue; }
      if (c === ',') { row.push(cell); cell = ""; i++; continue; }
      if (c === '\r') { i++; continue; }
      if (c === '\n') { row.push(cell); out.push(row); row = []; cell = ""; i++; continue; }
      cell += c; i++;
    }
  }
  if (cell.length || row.length) { row.push(cell); out.push(row); }
  if (out.length === 0) return { headers: [], rows: [] };
  const headers = out[0];
  const rows = out.slice(1).map(r => {
    const o = {};
    headers.forEach((h, idx) => { o[h] = r[idx] || ""; });
    return o;
  });
  return { headers, rows };
}

// ---------- API CALL ----------
async function callClaude({ prompt, system = SYSTEM_PROMPT, history = [], apiKey, model }) {
  if (!apiKey) throw new Error("No API key set. Open Settings (gear icon) and paste your Anthropic API key.");
  const messages = [...history, { role: "user", content: prompt }];
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "x-api-key": apiKey,
      "anthropic-version": "2023-06-01",
      "anthropic-dangerous-direct-browser-access": "true",
    },
    body: JSON.stringify({ model: model || "claude-sonnet-4-6", max_tokens: 2048, system, messages }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error("API " + res.status + ": " + txt.slice(0, 200));
  }
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n").trim();
  return text || "(no response)";
}

// ---------- TODO LIST ----------
const TodoList = () => {
  const [items, setItems] = useState(() => LS.get("todo_items", []));
  const [draft, setDraft] = useState("");

  const persist = (next) => { setItems(next); LS.set("todo_items", next); };
  const add = () => {
    const t = draft.trim();
    if (!t) return;
    persist([{ id: Date.now(), text: t, done: false }, ...items]);
    setDraft("");
  };
  const toggle = (id) => persist(items.map(i => i.id === id ? { ...i, done: !i.done } : i));
  const remove = (id) => persist(items.filter(i => i.id !== id));
  const clearDone = () => persist(items.filter(i => !i.done));
  const doneCount = items.filter(i => i.done).length;
  const openCount = items.length - doneCount;

  return (
    <Panel title={"To-Do" + (openCount ? " — " + openCount + " open" : "")} action={
      doneCount > 0 && (
        <button onClick={clearDone} style={{ background: "transparent", border: "none", color: T.textDim, fontFamily: FF.mono, fontSize: 10, cursor: "pointer", letterSpacing: 1.2 }}>
          CLEAR DONE
        </button>
      )
    }>
      <div style={{ display: "flex", gap: 6, marginBottom: 12 }}>
        <input value={draft} onChange={e => setDraft(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter") add(); }}
          placeholder="Add a task..."
          style={{ flex: 1, background: T.bgSunken, border: "1px solid " + T.border, color: T.text, fontFamily: FF.body, fontSize: 13, padding: "8px 12px", borderRadius: 2 }} />
        <button onClick={add} disabled={!draft.trim()}

const Dashboard = ({ onJump }) => {
  const [ssEmbed, setSsEmbed] = useState(() => LS.get("ss_embed_url", "https://priority-task-six.vercel.app"));
  const [tasksApi, setTasksApi] = useState(() => LS.get("tasks_api_url", "https://priority-task-six.vercel.app/api/tasks"));
  const [tasks, setTasks] = useState([]);
  const [tasksError, setTasksError] = useState("");
  const [tasksLoading, setTasksLoading] = useState(false);
  const [editing, setEditing] = useState(false);
  const [draftEmbed, setDraftEmbed] = useState("");
  const [draftTasksApi, setDraftTasksApi] = useState("");
  const [refreshTick, setRefreshTick] = useState(0);

  useEffect(() => {
    if (!tasksApi) { setTasks([]); setTasksError(""); return; }
    let cancelled = false;
    setTasksLoading(true); setTasksError("");
    fetch(tasksApi, { cache: "no-store", credentials: "include" })
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.json(); })
      .then(data => {
        if (cancelled) return;
        const arr = Array.isArray(data) ? data : (data.tasks || data.rows || data.data || []);
        setTasks(arr);
      })
      .catch(e => {
        if (cancelled) return;
        const msg = e.message || String(e);
        if (msg.includes("Failed to fetch") || msg.includes("NetworkError")) {
          setTasksError("CORS blocked. Your Vercel app needs a public CORS-enabled endpoint. Ask Claude for the route file.");
        } else if (msg.includes("HTTP 401") || msg.includes("HTTP 403")) {
          setTasksError("Endpoint requires sign-in. Need a /api/tasks/public route with no auth + CORS open.");
        } else if (msg.includes("HTTP 404")) {
          setTasksError("Endpoint not found at " + tasksApi + ". Check the URL or add the route.");
        } else {
          setTasksError(msg);
        }
      })
      .finally(() => { if (!cancelled) setTasksLoading(false); });
    return () => { cancelled = true; };
  }, [tasksApi, refreshTick]);

  const saveUrls = () => {
    const e = draftEmbed.trim(), a = draftTasksApi.trim();
    setSsEmbed(e); setTasksApi(a);
    LS.set("ss_embed_url", e); LS.set("tasks_api_url", a);
    setEditing(false);
  };
  const startEdit = () => { setDraftEmbed(ssEmbed); setDraftTasksApi(tasksApi); setEditing(true); };

  const renderTaskRow = (row, i, total) => {
    if (!row || typeof row !== "object") return null;
    const keys = Object.keys(row);
    const taskKey = keys.find(k => /^tasks?$/i.test(k)) || keys.find(k => /task|name|title|item/i.test(k)) || keys.find(k => !/^(id|row_?id)$/i.test(k)) || keys[0];
    const taskText = ((row[taskKey] ?? "") + "").trim();
    if (!taskText) return null;
    const statusKey = keys.find(k => /^status$/i.test(k)) || keys.find(k => /status|state/i.test(k));
    const ownerKey = keys.find(k => /^owner$/i.test(k)) || keys.find(k => /owner|assign|respon/i.test(k));
    const dueKey = keys.find(k => /enddate|due|deadline/i.test(k));
    const priorityKey = keys.find(k => /priorit/i.test(k));
    const status = statusKey ? ((row[statusKey] ?? "") + "").trim() : "";
    const owner = ownerKey ? ((row[ownerKey] ?? "") + "").trim() : "";
    const due = dueKey ? ((row[dueKey] ?? "") + "").trim() : "";
    const priority = priorityKey ? ((row[priorityKey] ?? "") + "").trim() : "";
    const isDone = /complete|done|closed/i.test(status);
    const isHigh = /high|urgent|critical|^1$/i.test(priority);
    const meta = [owner, due].filter(Boolean).join(" · ");
    return (
      <div key={i} style={{ display: "flex", gap: 10, padding: "10px 0", borderBottom: i < total - 1 ? "1px solid " + T.border : "none", alignItems: "flex-start", opacity: isDone ? 0.45 : 1 }}>
        <div style={{ width: 6, height: 6, minWidth: 6, borderRadius: "50%", background: isDone ? T.green : isHigh ? T.red : T.brass, marginTop: 7, flexShrink: 0 }} />
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontFamily: FF.body, fontSize: 13, color: T.text, textDecoration: isDone ? "line-through" : "none", lineHeight: 1.4, wordBreak: "break-word" }}>{taskText}</div>
          {meta && <div style={{ fontFamily: FF.mono, fontSize: 9, color: T.textDim, marginTop: 2, letterSpacing: 0.6 }}>{meta}</div>}
        </div>
      </div>
    );
  };

  const visibleTasks = tasks.filter(r => {
    if (!r || typeof r !== "object") return false;
    const keys = Object.keys(r);
    const statusKey = keys.find(k => /status|state/i.test(k));
    if (!statusKey) return true;
    return !/complete|done|closed/i.test(((r[statusKey] ?? "") + ""));
  }).slice(0, 12);

  return (
    <div style={{ padding: 22, display: "flex", flexDirection: "column", gap: 16 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontFamily: FF.mono, fontSize: 10, letterSpacing: 2.4, color: T.brass, textTransform: "uppercase" }}>Executive Dashboard</div>
          <h1 style={{ fontFamily: FF.display, fontSize: 36, fontWeight: 500, color: T.text, margin: "6px 0 0", letterSpacing: -0.8, fontStyle: "italic" }}>Good morning, Twiney.</h1>
        </div>
        <Btn icon="spark" variant="primary" onClick={() => onJump("terminal")}>Brief Me</Btn>
      </div>

      <Panel title="Priority Tasks — Live Tracker" accent={T.cyan} action={
        <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
          {ssEmbed && !editing && (
            <a href={ssEmbed} target="_blank" rel="noopener noreferrer" style={{ color: T.cyan, fontFamily: FF.mono, fontSize: 10, letterSpacing: 1.2, textDecoration: "none", display: "flex", alignItems: "center", gap: 4 }}>
              OPEN <Icon name="arrow" size={10} />
            </a>
          )}
          {!editing && (
            <button onClick={startEdit} style={{ background: "transparent", border: "none", color: T.textDim, fontFamily: FF.mono, fontSize: 10, cursor: "pointer", letterSpacing: 1.2 }}>

            <input value={draftEmbed} onChange={e => setDraftEmbed(e.target.value)} placeholder="https://priority-task-six.vercel.app"
              style={{ width: "100%", background: T.bgSunken, border: "1px solid " + T.border, color: T.text, fontFamily: FF.mono, fontSize: 12, padding: "10px 12px", borderRadius: 2 }} />
            <div style={{ fontFamily: FF.mono, fontSize: 10, letterSpacing: 1.4, color: T.textDim, textTransform: "uppercase", marginTop: 14, marginBottom: 6 }}>Tasks API URL (JSON endpoint)</div>
            <input value={draftTasksApi} onChange={e => setDraftTasksApi(e.target.value)} placeholder="https://priority-task-six.vercel.app/api/tasks"
              style={{ width: "100%", background: T.bgSunken, border: "1px solid " + T.border, color: T.text, fontFamily: FF.mono, fontSize: 12, padding: "10px 12px", borderRadius: 2 }} />
            <div style={{ fontFamily: FF.body, fontSize: 11, color: T.textFaint, marginTop: 10, lineHeight: 1.5 }}>

            <div style={{ marginTop: 16, display: "flex", justifyContent: "flex-end", gap: 8 }}>

const TerminalView = ({ apiKey, model }) => {
  const [messages, setMessages] = useState(() => LS.get("terminal_messages", []));
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const scrollRef = useRef(null);

  useEffect(() => {
    LS.set("terminal_messages", messages.slice(-40));
    if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
  }, [messages]);

  const send = useCallback(async (text) => {
    const prompt = (text ?? input).trim();
    if (!prompt || loading) return;
    setInput("");
    const next = [...messages, { role: "user", content: prompt, ts: Date.now() }];
    setMessages(next);
    setLoading(true);
    try {
      const history = next.slice(-10).filter(m => m.role !== "system").map(m => ({ role: m.role, content: m.content })).slice(0, -1);
      const reply = await callClaude({ prompt, history, apiKey, model });
      setMessages(prev => [...prev, { role: "assistant", content: reply, ts: Date.now() }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: "system", content: e.message, ts: Date.now() }]);
    } finally {
      setLoading(false);
    }
  }, [input, loading, messages, apiKey, model]);

  const clear = () => { setMessages([]); LS.set("terminal_messages", []); };

  const quickCmds = [
    "Brief me on today's priorities",
    "Draft a vendor escalation to Siemens about the SSO e-signature dispute",
    "Summarize the MGUH AHU-6 issue for Chris Castle",
    "Build me an executive outage report template",
    "Compare PM completion across the 10 hospitals — what's the pattern?",
    "Identify bottlenecks in the MWHC turnover checklist rollout",
  ];

  return (
    <div style={{ padding: 22, height: "100%", display: "flex", flexDirection: "column", gap: 14 }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-end" }}>
        <div>
          <div style={{ fontFamily: FF.mono, fontSize: 10, letterSpacing: 2.4, color: T.brass, textTransform: "uppercase" }}>AI Command Terminal</div>

        </div>
        <Btn icon="trash" onClick={clear} size="sm">Clear</Btn>
      </div>
      <div ref={scrollRef} style={{ flex: 1, background: T.bgSunken, border: "1px solid " + T.border, borderRadius: 3, padding: 18, overflowY: "auto", minHeight: 0, fontFamily: FF.mono, fontSize: 13, lineHeight: 1.65, color: T.text }}>
        {messages.length === 0 && (
          <div>
            <div style={{ color: T.brass, marginBottom: 14 }}>EXEC-OS // session initialized</div>
            <div style={{ color: T.textDim, fontSize: 12, marginBottom: 18 }}>Type any executive request. Or tap a quick start below.</div>
            <div style={{ color: T.textFaint, fontSize: 11, marginBottom: 8 }}>QUICK START</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
              {quickCmds.map((c, i) => (
                <button key={i} onClick={() => send(c)}
                  style={{ background: T.bgRaised, border: "1px solid " + T.border, color: T.text, fontFamily: FF.body, fontSize: 12, padding: "10px 14px", cursor: "pointer", borderRadius: 2, textAlign: "left", display: "flex", alignItems: "center", gap: 10 }}
                  onMouseEnter={e => e.currentTarget.style.borderColor = T.brass}
                  onMouseLeave={e => e.currentTarget.style.borderColor = T.border}>
                  <Icon name="arrow" size={12} color={T.brass} />{c}
                </button>
              ))}
            </div>
          </div>
        )}
        {messages.map((m, i) => (
          <div key={i} style={{ marginBottom: 18 }}>
            <div style={{ fontSize: 10, letterSpacing: 1.6, color: m.role === "user" ? T.brass : m.role === "system" ? T.red : T.cyan, marginBottom: 6 }}>
              {m.role === "user" ? "▸ TWINEY" : m.role === "system" ? "✕ SYSTEM" : "◉ EXEC-OS"}
              <span style={{ color: T.textFaint, marginLeft: 10, fontSize: 9 }}>{new Date(m.ts).toLocaleTimeString("en-US", { hour12: false })}</span>
            </div>
            <div style={{ whiteSpace: "pre-wrap", color: m.role === "system" ? T.red : T.text, fontFamily: m.role === "assistant" ? FF.body : FF.mono, fontSize: m.role === "assistant" ? 14 : 13, lineHeight: 1.6, paddingLeft: 14, borderLeft: "1px solid " + T.border }}>{m.content}</div>
            {m.role === "assistant" && (
              <div style={{ display: "flex", gap: 6, marginTop: 8, paddingLeft: 14 }}>
                <button onClick={() => navigator.clipboard?.writeText(m.content)} style={{ background: "transparent", border: "1px solid " + T.border, color: T.textDim, fontFamily: FF.mono, fontSize: 9, padding: "4px 8px", cursor: "pointer", borderRadius: 2, letterSpacing: 1, display: "flex", alignItems: "center", gap: 4 }}>
                  <Icon name="copy" size={10} /> COPY
                </button>
              </div>
            )}
          </div>
        ))}
        {loading && (
          <div style={{ color: T.cyan, display: "flex", alignItems: "center", gap: 8 }}>
            <span className="spin" style={{display:"inline-flex"}}><Icon name="load" size={12} /></span>
            <span style={{ fontSize: 11, letterSpacing: 1.2 }}>EXEC-OS thinking...</span>
          </div>
        )}
      </div>
      <div style={{ display: "flex", gap: 8, background: T.bgRaised, border: "1px solid " + T.borderBright, borderRadius: 3, padding: 4 }}>

  );

const FocusModuleRunner = ({ module, onBack, bd, apiKey, model }) => {
  const [input, setInput] = useState("");
  const [output, setOutput] = useState("");
  const [loading, setLoading] = useState(false);
  const [history, setHistory] = useState(() => LS.get("focus_" + module.id + "_history", []));

  const run = async () => {
    if (!input.trim() || loading) return;
    setLoading(true); setOutput("");
    try {
      const reply = await callClaude({ prompt: module.prompt(input), apiKey, model });
      setOutput(reply);
      const newHist = [{ input, output: reply, ts: Date.now() }, ...history].slice(0, 10);
      setHistory(newHist);
      LS.set("focus_" + module.id + "_history", newHist);
      if (module.id === "double") { bd.reset(); bd.setActive(true); }
    } catch (e) { setOutput("Error: " + e.message); }
    finally { setLoading(false); }
  };

  return (
    <div style={{ padding: 22 }}>
      <button onClick={onBack} style={{ background: "transparent", border: "none", color: T.textDim, fontFamily: FF.mono, fontSize: 10, letterSpacing: 1.6, cursor: "pointer", padding: 0, marginBottom: 16, display: "flex", alignItems: "center", gap: 6 }}>← BACK TO FOCUS OS</button>

          <Icon name={module.icon} size={22} color={module.color} />

        <div>
          <h1 style={{ fontFamily: FF.display, fontSize: 26, fontWeight: 500, color: T.text, margin: 0, letterSpacing: -0.4, fontStyle: "italic" }}>{module.name}</h1>
          <div style={{ fontFamily: FF.body, fontSize: 13, color: T.textDim, marginTop: 2 }}>{module.blurb}</div>

      </div>
      {module.id === "double" && bd.active && (
        <div style={{ background: T.cyan + "10", border: "1px solid " + T.cyan + "55", padding: 18, borderRadius: 3, marginBottom: 16, display: "flex", alignItems: "center", gap: 18 }}>
          <Icon name="timer" size={20} color={T.cyan} />
          <div style={{ flex: 1 }}>
            <div style={{ fontFamily: FF.mono, fontSize: 10, color: T.cyan, letterSpacing: 1.6 }}>BODY DOUBLE ACTIVE</div>
            <div style={{ fontFamily: FF.display, fontSize: 32, fontWeight: 500, color: T.text, letterSpacing: -1 }}>
              {String(Math.floor(bd.seconds / 60)).padStart(2, "0")}:{String(bd.seconds % 60).padStart(2, "0")}

          </div>
          <Btn icon="pause" onClick={() => bd.setActive(false)}>Pause</Btn>

      <Panel title={module.input}>
        <textarea value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => { if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) run(); }}

          style={{ width: "100%", background: T.bgSunken, border: "1px solid " + T.border, color: T.text, fontFamily: FF.body, fontSize: 14, padding: 14, borderRadius: 2, resize: "vertical" }} />
        <div style={{ marginTop: 12, display: "flex", justifyContent: "flex-end" }}>

      {output && (
        <div style={{ marginTop: 14 }}>

      {history.length > 0 && (
        <div style={{ marginTop: 14 }}>
          <Panel title={"History — " + module.name}>
            {history.map((h, i) => (
              <div key={i} style={{ padding: "10px 0", borderBottom: i < history.length - 1 ? "1px solid " + T.border : "none", cursor: "pointer" }}

          </Panel>
        </div>
      )}
    </div>

const FocusOS = ({ apiKey, model }) => {
  const [active, setActive] = useState(null);
  const [bdActive, setBdActive] = useState(false);
  const [bdSeconds, setBdSeconds] = useState(30 * 60);
  useEffect(() => {
    if (!bdActive) return;
    const t = setInterval(() => setBdSeconds(s => { if (s <= 1) { setBdActive(false); return 0; } return s - 1; }), 1000);

  }, [bdActive]);
  const bd = { active: bdActive, seconds: bdSeconds, setActive: setBdActive, reset: () => setBdSeconds(30 * 60) };

  if (active) return <FocusModuleRunner module={active} onBack={() => setActive(null)} bd={bd} apiKey={apiKey} model={model} />;

  }, []);

  useEffect(() => {
    const onKey = (e) => {
      if ((e.metaKey || e.ctrlKey) && e.key === "k") { e.preventDefault(); setPalette(p => !p); }
      if (e.key === "Escape") { setPalette(false); }
    };
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  return (
    <div style={{ height: "100vh", display: "flex", flexDirection: "column", overflow: "hidden" }}>
      <TopBar onOpenPalette={() => setPalette(true)} onOpenSettings={() => setSettings(true)} hasKey={!!apiKey} />
      <div style={{ flex: 1, display: "flex", overflow: "hidden" }}>
        <Sidebar active={view} onChange={setView} />
        <div style={{ flex: 1, overflowY: "auto", overflowX: "hidden" }}>
          {view === "dashboard" && <Dashboard onJump={setView} />}
          {view === "terminal" && <TerminalView apiKey={apiKey} model={model} />}
          {view === "focus" && <FocusOS apiKey={apiKey} model={model} />}
          {view === "email" && <EmailView apiKey={apiKey} model={model} />}
          {view === "reports" && <ReportsView apiKey={apiKey} model={model} />}
        </div>
      </div>
      <Palette open={palette} onClose={() => setPalette(false)} onJump={setView} />
      <Settings open={settings} onClose={() => setSettings(false)} apiKey={apiKey} setApiKey={setApiKey} model={model} setModel={setModel} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
